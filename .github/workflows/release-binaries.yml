# Workflow adapted from https://gist.github.com/NickNaso/0d478f1481686d5bcc868cac06620a60
# build directly on supported runners
name: Native release binaries

# Controls when the action will run. Triggers the workflow on push
on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "Ubuntu-24.04-GCC",
            os: ubuntu-24.04,
            cc: "gcc",
            cxx: "g++",
            build_type: "Release",
            generators: "Ninja"
          }
        - {
            name: "Ubuntu-22.04-GCC",
            os: ubuntu-22.04,
            cc: "gcc",
            cxx: "g++",
            build_type: "Release",
            generators: "Ninja"
          }
        - {
            name: "Macos-14-clang",
            os: macos-14,
            cc: "clang",
            cxx: "clang++",
            build_type: "Release",
            generators: "Ninja"
        }
        - {
            name: "Macos-15-intel-clang",
            os: macos-15-intel,
            cc: "clang",
            cxx: "clang++",
            build_type: "Release",
            generators: "Ninja"
          }
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - name: Define build environment variables
        shell: bash
        run: |
          echo github.event.action: ${{ github.event.action }}
          echo github.event_name: ${{ github.event_name }}
          ants_version="${{ github.ref_name }}"
          if [[ "$ants_version" =~ ^v[0-9] ]]; then
            ants_version="${ants_version#v}"
          fi
          echo "ANTS_VERSION=$ants_version" >> "$GITHUB_ENV"
          artifact="${{ runner.temp }}/ants-${ants_version}-${{ matrix.config.os }}-${{ runner.arch }}-${{ matrix.config.cc }}.zip"
          echo "CC=${{ matrix.config.cc }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.config.cxx }}" >> $GITHUB_ENV
          echo "ARTIFACT=${artifact}" >> "$GITHUB_ENV"
          echo "ARTIFACT_FILE_NAME_NO_EXT=$(basename ${artifact} .zip)" >> $GITHUB_ENV
      - name: Install dependencies on ubuntu
        if: startsWith(matrix.config.name, 'Ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install ninja-build cmake
          ninja --version
          cmake --version
          gcc --version
      - name: Install dependencies on macos
        if: startsWith(matrix.config.os, 'macos')
        run: |
          brew update
          brew install cmake ninja
          ninja --version
          cmake --version
      - name: Configure
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          mkdir build
          cd build
          cmake \
            -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} \
            -G "${{ matrix.config.generators }}" \
            -DBUILD_TESTING=ON \
            -DRUN_SHORT_TESTS=ON \
            -DRUN_LONG_TESTS=OFF \
            -DANTS_INSTALL_BIN_ONLY=ON \
            -DCMAKE_INSTALL_PREFIX:PATH=${{ runner.temp }}/install/ants-${{ env.ANTS_VERSION }} \
            ${GITHUB_WORKSPACE}
      - name: Build
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          cd build
          cmake --build . --config ${{ matrix.config.build_type }} --parallel
      - name: Test
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          cd build/ANTS-build
          ctest
      - name: Install
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          cd build/ANTS-build
          cmake --install .
      - name: Pack
        shell: bash
        working-directory: ${{ runner.temp }}
        run: |
          cd install
          zip -r ${ARTIFACT} .
      - name: Upload artifact (for pre-release testing)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          path: ${{ env.ARTIFACT }}
          name: ${{ env.ARTIFACT_FILE_NAME_NO_EXT }}
          retention-days: 7
      - name: Upload release asset (for release event)
        if: github.event_name == 'release'
        # Previously was using actions/upload-release-asset@v1 , but this had some
        # errors with large files
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          artifacts: "${{ env.ARTIFACT }}"
          artifactContentType: application/zip
          token: ${{ secrets.GITHUB_TOKEN }}
