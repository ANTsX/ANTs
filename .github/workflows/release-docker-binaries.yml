name: Cross-platform release binaries
on:
  release:
    types: [created]
  workflow_dispatch:

env:
  CMAKE_VERSION: 3.23.1 # for ubuntu
jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "almalinux-8-GCC",
            os_desc: almalinux8,
            image: "almalinux:8",
            build_type: "Release",
            cc: "gcc",
            cxx: "g++",
            generators: "Unix Makefiles"
          }
        - {
            name: "almalinux-9-GCC",
            os_desc: almalinux9,
            image: "almalinux:9",
            build_type: "Release",
            cc: "gcc",
            cxx: "g++",
            generators: "Unix Makefiles"
          }
        - { name: "CentOS-7-GCC",
            os_desc: centos7,
            image: "cookpa/antscentos7base",
            build_type: "Release",
            cc: "gcc",
            cxx: "g++",
            generators: "Unix Makefiles"
          }
        - {
            name: "Ubuntu-18.04-GCC",
            os_desc: ubuntu18.04,
            ubuntu_repo_label: "bionic",
            image: "ubuntu:18.04",
            build_type: "Release",
            cc: "gcc",
            cxx: "g++",
            generators: "Ninja"
          }
        - {
            name: "Ubuntu-20.04-GCC",
            os_desc: ubuntu20.04,
            image: "ubuntu:20.04",
            ubuntu_repo_label: "focal",
            build_type: "Release",
            cc: "gcc",
            cxx: "g++",
            generators: "Ninja"
          }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - name: Define build environment variables
        shell: bash
        run: |
          echo github.event.action: ${{ github.event.action }}
          echo github.event_name: ${{ github.event_name }}
          ants_version="${{ github.ref_name }}"
          if [[ "$ants_version" =~ ^v[0-9] ]]; then
            ants_version="${ants_version#v}"
          fi
          echo "ANTS_VERSION=$ants_version" >> "$GITHUB_ENV"
          # Just file name, because we're inside a container, the artifact upload has to find it at the mounted path later
          artifact="ants-${ants_version}-${{ matrix.config.os_desc }}-${{ runner.arch }}-${{ matrix.config.cc }}.zip"
          echo "CC=${{ matrix.config.cc }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.config.cxx }}" >> $GITHUB_ENV
          echo "ARTIFACT=${artifact}" >> "$GITHUB_ENV"
          echo "ARTIFACT_FILE_NAME_NO_EXT=$(basename ${artifact} .zip)" >> $GITHUB_ENV
      - name: Set up build container
        run: |
          docker pull ${{ matrix.config.image }}
          docker create --name build_container -v ${{ github.workspace }}:/workspace -v ${{ runner.temp }}/artifact:/artifact ${{ matrix.config.image }} sleep infinity
          docker start build_container
      - name: Install dependencies on Alma
        if: startsWith(matrix.config.name, 'almalinux')
        run: |
          docker exec --user root build_container bash -c "
            yum -y update && yum clean all
            yum groupinstall -y 'Development Tools'
            yum install -y cmake
            cmake --version
            gcc --version
          "
      - name: Install dependencies on Ubuntu
        if: startsWith(matrix.config.name, 'Ubuntu')
        run: |
          docker exec --user root build_container bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              apt-transport-https \
              bc \
              build-essential \
              ca-certificates \
              gnupg \
              ninja-build \
              git \
              software-properties-common \
              wget \
              zip
            wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc 2>/dev/null | apt-key add -
            apt-add-repository -y 'deb https://apt.kitware.com/ubuntu/ ${{ matrix.config.ubuntu_repo_label }} main'
            apt-get update
            apt-get -y install cmake=${CMAKE_VERSION}-0kitware1${{ matrix.config.os_desc }}.1 cmake-data=${CMAKE_VERSION}-0kitware1${{ matrix.config.os_desc }}.1
            ninja --version
            cmake --version
            gcc --version
          "
      - name: Configure # Run with login shell to source bashrc, needed for centos
        run: |
          docker exec --user root build_container bash --login -c "
            mkdir -p /workspace/build
            cd /workspace/build
            cmake \
              -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} \
              -G '${{ matrix.config.generators }}' \
              -DBUILD_TESTING=ON \
              -DRUN_SHORT_TESTS=ON \
              -DRUN_LONG_TESTS=OFF \
              -DANTS_INSTALL_BIN_ONLY=ON \
              -DCMAKE_INSTALL_PREFIX:PATH=/workspace/install/ants-${{ env.ANTS_VERSION }} \
              /workspace
          "
      - name: Build
        run: |
          docker exec --user root build_container bash --login -c "
            cd /workspace/build
            cmake --build . --config ${{ matrix.config.build_type }} --parallel 1
          "
      - name: Test
        run: |
          docker exec --user root build_container bash --login -c "
            cd /workspace/build/ANTS-build
            ctest
          "
      - name: Install
        run: |
          docker exec --user root build_container bash --login -c "
            cd /workspace/build/ANTS-build
            cmake --install .
          "
      - name: Pack
        run: |
          docker exec --user root build_container bash --login -c "
            cd /workspace/install
            zip -r /artifact/${{ env.ARTIFACT }} .
          "
      - name: Upload artifact for pre-release testing
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          path: ${{ runner.temp }}/artifact/${{ env.ARTIFACT }}
          name: ${{ env.ARTIFACT_FILE_NAME_NO_EXT }}
          retention-days: 7
      - name: Upload release asset
        if: github.event_name == 'release'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          artifacts: "${{ runner.temp }}/artifact/${{ env.ARTIFACT }}"
          artifactContentType: application/zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up
        run: |
          docker stop build_container
          docker rm build_container
