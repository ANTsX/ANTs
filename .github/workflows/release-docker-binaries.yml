name: Cross-platform release binaries
on:
  release:
    types: [created]
  workflow_dispatch:

env:
  CMAKE_VERSION: 3.23.1 # for ubuntu
jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "almalinux-8-GCC",
            os_desc: almalinux8,
            image: "antsx/antsbuildcontainers:alma8-20260407",
            build_type: "Release",
            generators: "Ninja"
          }
        - {
            name: "almalinux-9-GCC",
            os_desc: almalinux9,
            image: "antsx/antsbuildcontainers:alma9-20260407",
            build_type: "Release",
            generators: "Ninja"
          }
        - { name: "CentOS-7-GCC",
            os_desc: centos7,
            image: "antsx/antsbuildcontainers:centos7-20260407",
            build_type: "Release",
            generators: "Unix Makefiles"
          }
        - {
            name: "Ubuntu-18.04-GCC",
            os_desc: ubuntu18.04,
            image: "antsx/antsbuildcontainers:ubuntu18_04-20260407",
            build_type: "Release",
            generators: "Ninja"
          }
        - {
            name: "Ubuntu-20.04-GCC",
            os_desc: ubuntu20.04,
            image: "antsx/antsbuildcontainers:ubuntu20_04-20260407",
            build_type: "Release",
            generators: "Ninja"
          }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
      - name: Define build environment variables
        shell: bash
        run: |
          echo github.event.action: ${{ github.event.action }}
          echo github.event_name: ${{ github.event_name }}
          ants_version="${{ github.ref_name }}"
          if [[ "$ants_version" =~ ^v[0-9] ]]; then
            ants_version="${ants_version#v}"
          fi
          echo "ANTS_VERSION=$ants_version" >> "$GITHUB_ENV"
          # Just file name, because we're inside a container, the artifact upload has to find it at the mounted path later
          artifact="ants-${ants_version}-${{ matrix.config.os_desc }}-${{ runner.arch }}-${{ matrix.config.cc }}.zip"
          echo "ARTIFACT=${artifact}" >> "$GITHUB_ENV"
          echo "ARTIFACT_FILE_NAME_NO_EXT=$(basename ${artifact} .zip)" >> $GITHUB_ENV
      - name: Set up build container
        run: |
          docker pull ${{ matrix.config.image }}
          docker create --name build_container -v ${{ github.workspace }}:/workspace -v ${{ runner.temp }}/artifact:/artifact ${{ matrix.config.image }} sleep infinity
          docker start build_container
      - name: Configure # Run with login shell to source bashrc, needed for centos
        run: |
          docker exec --user root build_container bash --login -c "
            mkdir -p /workspace/build
            cd /workspace/build
            cmake \
              -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} \
              -G '${{ matrix.config.generators }}' \
              -DBUILD_TESTING=ON \
              -DRUN_SHORT_TESTS=ON \
              -DRUN_LONG_TESTS=OFF \
              -DANTS_INSTALL_BIN_ONLY=ON \
              -DCMAKE_INSTALL_PREFIX:PATH=/workspace/install/ants-${{ env.ANTS_VERSION }} \
              /workspace
          "
      - name: Build
        run: |
          docker exec --user root build_container bash --login -c "
            cd /workspace/build
            cmake --build . --config ${{ matrix.config.build_type }} --parallel 1
          "
      - name: Test
        run: |
          docker exec --user root build_container bash --login -c "
            cd /workspace/build/ANTS-build
            ctest
          "
      - name: Install
        run: |
          docker exec --user root build_container bash --login -c "
            cd /workspace/build/ANTS-build
            cmake --install .
          "
      - name: Pack
        run: |
          docker exec --user root build_container bash --login -c "
            cd /workspace/install
            zip -r /artifact/${{ env.ARTIFACT }} .
          "
      - name: Upload artifact for pre-release testing
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          path: ${{ runner.temp }}/artifact/${{ env.ARTIFACT }}
          name: ${{ env.ARTIFACT_FILE_NAME_NO_EXT }}
          retention-days: 7
      - name: Upload release asset
        if: github.event_name == 'release'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          artifacts: "${{ runner.temp }}/artifact/${{ env.ARTIFACT }}"
          artifactContentType: application/zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up
        run: |
          docker stop build_container
          docker rm build_container
